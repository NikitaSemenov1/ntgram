syntax = "proto3";

package ntgram.common.v1;

message UserRef {
  int64 user_id = 1;
}

message RpcError {
  int32 code = 1;
  string message = 2;
}

message ErrorDetail {
  int32 code = 1;
  string message = 2;
}

message ServiceResponseMeta {
  bool ok = 1;
  RpcError error = 2;
}

message MinimalProfile {
  int64 user_id = 1;
  string first_name = 2;
  string last_name = 3;
  string username = 4;
}

message MinimalChat {
  int64 chat_id = 1;
  string title = 2;
  int32 participants_count = 3;
  int32 version = 4;
  int64 date_unix = 5;
  int64 creator_user_id = 6;
}

message InputPeer {
  int64 actor_user_id = 1;
  oneof peer {
    int64 user_id = 2;   // PM (inputPeerUser / inputPeerSelf)
    int64 chat_id = 3;   // group (inputPeerChat)
  }
}

message UpdateNewMessage {
  int64 message_id = 1;
  int64 from_user_id = 2;
  string text = 3;
  int64 date = 4;
  int64 peer_user_id = 5;
  int64 peer_chat_id = 6;
  bool out = 7;
  int32 pts = 8;
  int32 pts_count = 9;
}

message UpdateMessageId {
  int64 message_id = 1;
  int64 random_id = 2;
}

message UpdateReadHistoryOutbox {
  int64 peer_user_id = 1;
  int64 max_id = 2;
  int32 pts = 3;
  int32 pts_count = 4;
}

message UpdateItem {
  oneof update {
    UpdateNewMessage new_message = 1;
    UpdateMessageId message_id = 2;
    UpdateReadHistoryOutbox read_outbox = 3;
  }
  string raw_update_json = 10;
  string update_type = 11;
  int32 pts = 12;
}

message UpdateEnvelope {
  repeated UpdateItem updates = 1;
  repeated MinimalProfile users = 2;
  repeated MinimalChat chats = 3;
  int32 seq = 4;
  int64 date = 5;
}
